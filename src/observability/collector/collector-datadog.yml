receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 8192

connectors:
  datadog/connector:

exporters:
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

  datadog:
    api:
      key: ${env:DD_API_KEY}
      site: ${env:DD_SITE}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, datadog/connector, datadog]
    metrics:
      receivers: [otlp, datadog/connector]
      processors: [batch]
      exporters: [debug, datadog]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, datadog]


