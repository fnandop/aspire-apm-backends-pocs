receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  debug:
    verbosity: detailed
  azuremonitor:
    connection_string: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
    # Timeout for exporting - optional
    # timeout: 30s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, azuremonitor]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, azuremonitor]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, azuremonitor]