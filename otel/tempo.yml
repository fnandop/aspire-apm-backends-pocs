server:
  http_listen_port: 3100

distributor:
  receivers:
    jaeger:
      protocols:
        thrift_http:
        grpc:
        thrift_binary:
        thrift_compact:
    zipkin:

ingester:
  max_block_duration_seconds: 60

compactor:
  compaction:
    block_duration_seconds: 60

storage:
  trace:
    backend: local
    local:
      path: /var/tempo
    wal:
      path: /var/tempo/wal

# Enable metrics generator for Prometheus-compatible metrics
metrics_generator:
  processor:
    span_metrics:
      # Enable dimensions that match Jaeger/OTEL conventions
      dimensions:
        - name: service.name
          default: unknown
        - name: span.name
          default: unknown
        - name: span.kind
          default: unknown
        - name: status.code
          default: unknown

# Local development - enable all receivers
receiver:
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_http:
        endpoint: 0.0.0.0:14268
      thrift_binary:
        endpoint: 0.0.0.0:6832
      thrift_compact:
        endpoint: 0.0.0.0:6831
  zipkin:
    endpoint: 0.0.0.0:9411
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318