receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  debug:
    verbosity: detailed
  # Elastic APM
  otlp/elastic:
    endpoint: http://apm-server:8200
    tls:
      insecure: true
  # Jaeger
  otlp/jaeger:
    endpoint: http://jaeger:4317
    tls:
      insecure: true
  # Tempo
  otlp/tempo:
    endpoint: http://tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/elastic, otlp/jaeger, otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/elastic]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/elastic]
  # Note: Application Insights requires AZURE* env vars and is optional
  # If APPLICATIONINSIGHTS_CONNECTION_STRING is present, add azuremonitor exporter
  # For multi-backend demo, we keep it simple and focus on OSS backends