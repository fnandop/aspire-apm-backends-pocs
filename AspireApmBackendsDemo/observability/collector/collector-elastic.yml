receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 8192

exporters:
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

  otlphttp/elastic:
    endpoint: http://apm-server:8200
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/elastic]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/elastic]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/elastic]
